apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: my-app
        # The CI script looks for the line starting with "image:" 
        # and replaces "placeholder" with your actual Docker tag.
        image: dukuly99/my-app:placeholder
        ports:
        - containerPort: 80